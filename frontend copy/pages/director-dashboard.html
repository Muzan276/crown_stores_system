<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elmuzan Stores - Director Dashboard</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/director.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Elmuzan Stores</div>
    <div class="nav-user">
      <span id="userName"></span>
      <span class="role-badge">Director</span>
      <button onclick="toggleDarkMode()" class="btn-dark" id="darkBtn">🌙 Dark Mode</button>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="dashboard">
    <h2>Director Dashboard</h2>
    <p class="subtitle">Business Overview & Analytics</p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-info">
          <h3 id="todayTransactions">-</h3>
          <p>Today's Sales</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-info">
          <h3 id="todayRevenue">-</h3>
          <p>Today's Revenue</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏦</div>
        <div class="stat-info">
          <h3 id="todayProfit">-</h3>
          <p>Today's Profit</p>
        </div>
      </div>
      <div class="stat-card" id="lowStockCard">
        <div class="stat-icon">⚠️</div>
        <div class="stat-info">
          <h3 id="lowStockCount">-</h3>
          <p>Low Stock Alerts</p>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="dash-card">
        <h3>🔥 Top 5 Products</h3>
        <div id="topProducts"></div>
      </div>
      <div class="dash-card">
        <h3>⚠️ Low Stock Products</h3>
        <div id="lowStockList"></div>
      </div>
    </div>

    <div class="dash-card full-width">
      <h3>🕒 Last 5 Sales</h3>
      <div id="recentSales"></div>
    </div>

    <div class="dashboard-grid">
      <div class="dash-card">
        <h3>📊 Stock Levels</h3>
        <canvas id="stockChart"></canvas>
      </div>
      <div class="dash-card">
        <h3>📈 Top Products Chart</h3>
        <canvas id="topChart"></canvas>
      </div>
    </div>

    <div class="dash-card full-width">
      <h3>Reports</h3>
      <div class="report-buttons">
        <button onclick="viewReport('daily-sales')" class="btn-report">📊 Daily Sales</button>
        <button onclick="viewReport('inventory')" class="btn-report">📦 Inventory</button>
        <button onclick="viewReport('procurement')" class="btn-report">🚚 Procurement</button>
      </div>
      <div id="reportData" class="report-data"></div>
    </div>
  </div>

  <script src="../js/dashboard.js"></script>
  <script src="../js/director.js"></script>
</body>
</html>
